apply plugin: 'com.android.library'
apply plugin: 'com.vanniktech.maven.publish'

android {
    if (project.android.hasProperty("namespace")) {
        namespace 'com.arthenica.ffmpegkit'
    }
    compileSdk 35
    ndkVersion "26.2.11394342"

    defaultConfig {
        minSdk 16
        targetSdk 35
        versionCode 160600
        versionName "6.0.LTS"
        project.archivesBaseName = "ffmpeg-kit"
        consumerProguardFiles "consumer-rules.pro"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    sourceSets {
        main {
            jniLibs.srcDirs = ["../libs"]
        }
    }

    testOptions {
        unitTests.returnDefaultValues = true
        unitTests.all {
            systemProperty 'enable.ffmpeg.kit.test.mode', 'true'
        }
    }
}

// Version passed from CI via -Ppublish.version; falls back to local-dev default.
def publishVersion = project.findProperty('publish.version') ?: '7.1.5'

// See the matching comment in tools/android/build.gradle - same
// vanniktech-auto-configures-singleVariant reasoning applies here.
mavenPublishing {
    coordinates("dev.ffmpegkit-maintained", "ffmpeg", publishVersion)

    signAllPublications()
    publishToMavenCentral(true)

    pom {
        name = "ffmpeg / ffmpegkit / ffmpeg-kit — Android FFmpeg Library (7.1 LTS, Free)"
        description = "Android FFmpeg library — 7.1 LTS line, Free tier. VP8/VP9 + AV1 encode/decode (libvpx, libaom, dav1d), Opus/Vorbis/Speex audio, software-only. Community-maintained fork of FFmpegKit (ffmpegkit / ffmpeg-kit). Paid tiers add H.264/H.265 encode, hardware codecs, TLS, OCR, Whisper transcription, SRT — see Project URL."
        inceptionYear = "2026"
        url = "https://github.com/ffmpegkit-maintained/ffmpeg/releases"

        licenses {
            license {
                name = "GNU Lesser General Public License v3.0"
                url = "https://github.com/ffmpegkit-maintained/ffmpeg/blob/main/LICENSE"
                distribution = "repo"
