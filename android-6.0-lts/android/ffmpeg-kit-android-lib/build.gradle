apply plugin: 'com.android.library'
apply plugin: 'com.vanniktech.maven.publish'

android {
    if (project.android.hasProperty("namespace")) {
        namespace 'com.arthenica.ffmpegkit'
    }
    compileSdk 35
    ndkVersion "26.2.11394342"

    defaultConfig {
        minSdk 16
        targetSdk 35
        versionCode 160600
        versionName "6.0.LTS"
        project.archivesBaseName = "ffmpeg-kit"
        consumerProguardFiles "consumer-rules.pro"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    sourceSets {
        main {
            jniLibs.srcDirs = ["../libs"]
        }
    }

    testOptions {
        unitTests.returnDefaultValues = true
        unitTests.all {
            systemProperty 'enable.ffmpeg.kit.test.mode', 'true'
        }
    }
}

// Version passed from CI via -Ppublish.version; falls back to local-dev default.
def publishVersion = project.findProperty('publish.version') ?: '6.0.3'

// See the matching comment in tools/android/build.gradle - same
// vanniktech-auto-configures-singleVariant reasoning applies here.
mavenPublishing {
    coordinates("dev.ffmpegkit-maintained", "ffmpeg", publishVersion)

    signAllPublications()
    publishToMavenCentral(true)

    pom {
        name = "ffmpeg / ffmpegkit / ffmpeg-kit — Android FFmpeg Library (6.0 LTS, Free)"
        description = "Android FFmpeg library — 6.0 LTS line, Free tier. VP8/VP9 + AV1 encode/decode (libvpx, libaom, dav1d), Opus/Vorbis/Speex audio, software-only. Community-maintained fork of FFmpegKit (ffmpegkit / ffmpeg-kit). Paid tiers add H.264/H.265 encode, hardware codecs, TLS, OCR, Whisper transcription, SRT — see Project URL."
        inceptionYear = "2026"
        url = "https://www.jokobee.com"

        licenses {
            license {
                name = "GNU Lesser General Public License v3.0"
                url = "https://github.com/ffmpegkit-maintained/ffmpeg/blob/main/LICENSE"
                distribution = "repo"
            }
        }

        developers {
            developer {
                id = "jokobee"
                name = "Jokobee"
                url = "https://www.jokobee.com"
                email = "contact@jokobee.com"
            }
        }

        scm {
            url = "https://github.com/ffmpegkit-maintained/ffmpeg"
            connection = "scm:git:git://github.com/ffmpegkit-maintained/ffmpeg.git"
            developerConnection = "scm:git:ssh://git@github.com/ffmpegkit-maintained/ffmpeg.git"
        }
    }
}

// ── Redirect publications (search aliases: ffmpegkit, ffmpeg-kit) ─────────
// A prior attempt at this (commit 67ebe9c) was reverted (commit 9541aec)
// because signAllPublications() only signs publications declared inside
// mavenPublishing{} -- these manually-added publications never got GPG
// signatures, which Maven Central's Central Portal rejects at validation.
// Fixed here by explicitly signing them below, reusing the same in-memory
// PGP key vanniktech's signAllPublications() already configures on the
// `signing` extension via the ORG_GRADLE_PROJECT_signingInMemoryKey* project
// properties (see publish-maven-free.yml) -- no separate key setup needed.
tasks.register('redirectKitSourcesJar', Jar) { archiveClassifier = 'sources' }
tasks.register('redirectDashSourcesJar', Jar) { archiveClassifier = 'sources' }
tasks.register('redirectKitJavadocJar', Jar) { archiveClassifier = 'javadoc' }
tasks.register('redirectDashJavadocJar', Jar) { archiveClassifier = 'javadoc' }

publishing {
    publications {
        mavenRedirectKit(MavenPublication) {
            groupId    = 'dev.ffmpegkit-maintained'
            artifactId = 'ffmpegkit'
            version    = publishVersion
            artifact(tasks.named('redirectKitSourcesJar'))
            artifact(tasks.named('redirectKitJavadocJar'))
            pom {
                name        = 'FFmpegKit Android (alias: ffmpegkit → ffmpeg)'
                description = 'Search alias on Maven Central. Use dev.ffmpegkit-maintained:ffmpeg in your project — same Android FFmpeg library (ffmpegkit / ffmpeg-kit maintained fork).'
                inceptionYear = '2026'
                url         = 'https://github.com/ffmpegkit-maintained/ffmpeg'
                licenses {
                    license {
                        name         = 'GNU Lesser General Public License v3.0'
                        url          = 'https://github.com/ffmpegkit-maintained/ffmpeg/blob/main/LICENSE'
                        distribution = 'repo'
                    }
                }
                developers {
                    developer {
                        id   = 'jokobee'
                        name = 'Jokobee'
                        url  = 'https://www.jokobee.com'
                        email = 'contact@jokobee.com'
                    }
                }
                scm {
                    url                 = 'https://github.com/ffmpegkit-maintained/ffmpeg'
                    connection          = 'scm:git:git://github.com/ffmpegkit-maintained/ffmpeg.git'
                    developerConnection = 'scm:git:ssh://git@github.com/ffmpegkit-maintained/ffmpeg.git'
                }
                withXml {
                    def dep = asNode().appendNode('dependencies').appendNode('dependency')
                    dep.appendNode('groupId',    'dev.ffmpegkit-maintained')
                    dep.appendNode('artifactId', 'ffmpeg')
                    dep.appendNode('version',    publishVersion)
                    dep.appendNode('scope',      'compile')
                    dep.appendNode('type',       'aar')
                }
            }
        }
        mavenRedirectDash(MavenPublication) {
            groupId    = 'dev.ffmpegkit-maintained'
            artifactId = 'ffmpeg-kit'
            version    = publishVersion
            artifact(tasks.named('redirectDashSourcesJar'))
            artifact(tasks.named('redirectDashJavadocJar'))
            pom {
                name        = 'FFmpegKit Android (alias: ffmpeg-kit → ffmpeg)'
                description = 'Search alias on Maven Central. Use dev.ffmpegkit-maintained:ffmpeg in your project — same Android FFmpeg library (ffmpegkit / ffmpeg-kit maintained fork).'
                inceptionYear = '2026'
                url         = 'https://github.com/ffmpegkit-maintained/ffmpeg'
                licenses {
                    license {
                        name         = 'GNU Lesser General Public License v3.0'
                        url          = 'https://github.com/ffmpegkit-maintained/ffmpeg/blob/main/LICENSE'
                        distribution = 'repo'
                    }
                }
                developers {
                    developer {
                        id   = 'jokobee'
                        name = 'Jokobee'
                        url  = 'https://www.jokobee.com'
                        email = 'contact@jokobee.com'
                    }
                }
                scm {
                    url                 = 'https://github.com/ffmpegkit-maintained/ffmpeg'
                    connection          = 'scm:git:git://github.com/ffmpegkit-maintained/ffmpeg.git'
                    developerConnection = 'scm:git:ssh://git@github.com/ffmpegkit-maintained/ffmpeg.git'
                }
                withXml {
                    def dep = asNode().appendNode('dependencies').appendNode('dependency')
                    dep.appendNode('groupId',    'dev.ffmpegkit-maintained')
                    dep.appendNode('artifactId', 'ffmpeg')
                    dep.appendNode('version',    publishVersion)
                    dep.appendNode('scope',      'compile')
                    dep.appendNode('type',       'aar')
                }
            }
        }
    }
}

// The fix: explicitly sign the two manually-declared publications above,
// using the same signing extension/key vanniktech's signAllPublications()
// configured for the primary publication.
signing {
    sign(publishing.publications.mavenRedirectKit)
    sign(publishing.publications.mavenRedirectDash)
}

task javadoc(type: Javadoc) {
    title = 'FFmpegKit'
    destinationDir = file("${projectDir}/../../docs/android/javadoc")
    classpath += project.files(android.getBootClasspath().join(File.pathSeparator))
    source = android.sourceSets.main.java.srcDirs
    configurations.implementation.setCanBeResolved(true)
    classpath += configurations.implementation
}

dependencies {
    api 'com.arthenica:smart-exception-java:0.2.1'
    testImplementation "androidx.test.ext:junit:1.1.5"
    testImplementation 'org.json:json:20230618'
}

