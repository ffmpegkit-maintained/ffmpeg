// vanniktech's mavenPublishing{} pom{} block (top of this file) applies to
// EVERY MavenPublication in the project via its own afterEvaluate, not just
// the primary one it auto-generates -- it runs AFTER this file is parsed,
// so it silently overwrote the name/description set inside mavenHttps/
// mavenHttpsGpl's own pom{} blocks above (confirmed: the live-published
// ffmpegkit/ffmpeg-kit redirect aliases have this exact bug too -- their
// real name/description on Maven Central is the primary "ffmpeg" artifact's,
// not the custom text written for them; already published, can't be fixed
// retroactively, only in future versions). Fix: register our own
// afterEvaluate AFTER vanniktech's mavenPublishing{} block has already run
// (Gradle runs afterEvaluate callbacks in registration order), so ours
// executes last and wins the final overwrite.
afterEvaluate {
    publishing.publications.mavenHttps.pom {
        name = 'FFmpegKit Https'
        description = 'Actively maintained continuation of com.arthenica:ffmpeg-kit-https (retired, archived April 2025). Same com.arthenica.ffmpegkit API, drop-in replacement -- just change the groupId. TLS/https:// URL support (gmp+gnutls), Android SDK 35, 16 KB page size, security-tracked. By Jokobee -- jokobee.com'
    }
    publishing.publications.mavenHttpsGpl.pom {
        name = 'FFmpegKit Https GPL'
        description = 'Actively maintained continuation of com.arthenica:ffmpeg-kit-https-gpl (retired, archived April 2025). Same com.arthenica.ffmpegkit API, drop-in replacement -- just change the groupId. TLS/https:// URL support (gmp+gnutls) plus GPL encoders (x264/x265/xvidcore/vid.stab). GPL-3.0 -- copyleft applies to your app. Android SDK 35, 16 KB page size, security-tracked. By Jokobee -- jokobee.com'
    }
    // Same fix applied retroactively to the redirect aliases (already live on
    // Maven Central as of 6.0.3 with the WRONG name/description -- that
    // published version can't be corrected, Maven Central is immutable, but
    // every version from here on gets the right text).
    publishing.publications.mavenRedirectKit.pom {
        name = 'FFmpegKit Android (alias: ffmpegkit -> ffmpeg)'
        description = 'Search alias on Maven Central. Use dev.ffmpegkit-maintained:ffmpeg in your project -- same Android FFmpeg library (ffmpegkit / ffmpeg-kit maintained fork).'
    }
    publishing.publications.mavenRedirectDash.pom {
        name = 'FFmpegKit Android (alias: ffmpeg-kit -> ffmpeg)'
        description = 'Search alias on Maven Central. Use dev.ffmpegkit-maintained:ffmpeg in your project -- same Android FFmpeg library (ffmpegkit / ffmpeg-kit maintained fork).'
    }
}

task javadoc(type: Javadoc) {
    title = 'FFmpegKit'
    destinationDir = file("${projectDir}/../../docs/android/javadoc")
    classpath += project.files(android.getBootClasspath().join(File.pathSeparator))
    source = android.sourceSets.main.java.srcDirs
    configurations.implementation.setCanBeResolved(true)
    classpath += configurations.implementation
}

dependencies {
    api 'com.arthenica:smart-exception-java:0.2.1'
    testImplementation "androidx.test.ext:junit:1.1.5"
    testImplementation 'org.json:json:20230618'
}

// --- THIRD-PARTY-NOTICES : bundle automatique dans les assets de l'AAR ---
tasks.register("copyThirdPartyNotices", Copy) {
    from rootProject.file("../../THIRD-PARTY-NOTICES.txt")
    into layout.projectDirectory.dir("src/main/assets")
}
tasks.named("preBuild") { dependsOn "copyThirdPartyNotices" }
