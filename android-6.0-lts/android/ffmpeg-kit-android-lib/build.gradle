// ── Arthenica-name alias publications: REAL distinct binaries, not redirects ──
// Unlike mavenRedirectKit/mavenRedirectDash above (empty POM pointing at the
// "ffmpeg" artifact), these publish the actual .aar built and binary-verified
// by build-free-https.yml / build-free-https-gpl.yml (CI downloads the AAR,
// places it at prebuilt-aars/, this Gradle config publishes it as-is). See
// project-ffmpeg-free-tier-expansion-plan memory for the "un nom = son vrai
// contenu" principle this exists to satisfy. Each publication needs its own
// distinctly-named Jar tasks (archiveBaseName, not just task name) -- sharing
// one between publications causes an implicit-dependency Gradle failure only
// caught by a real (non---dry-run) local execution, see
// feedback-gradle-shared-tasks-multi-publication memory.
tasks.register('httpsSourcesJar', Jar) {
    archiveBaseName = 'ffmpeg-kit-https'
    archiveClassifier = 'sources'
    from android.sourceSets.main.java.srcDirs
}
tasks.register('httpsJavadocJar', Jar) {
    archiveBaseName = 'ffmpeg-kit-https'
    archiveClassifier = 'javadoc'
}
tasks.register('httpsGplSourcesJar', Jar) {
    archiveBaseName = 'ffmpeg-kit-https-gpl'
    archiveClassifier = 'sources'
    from android.sourceSets.main.java.srcDirs
}
tasks.register('httpsGplJavadocJar', Jar) {
    archiveBaseName = 'ffmpeg-kit-https-gpl'
    archiveClassifier = 'javadoc'
}

