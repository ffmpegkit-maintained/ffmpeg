name: Publish Free AAR to Maven Central

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag LTS Android (ex: v8.1.7-lts-android)'
        required: true
      redirects_only:
        description: 'Publish ONLY the ffmpegkit/ffmpeg-kit search-alias redirects (skip the primary artifact -- use when the primary is already live and only the new alias publications need to go out)'
        required: false
        default: 'false'
      https_aliases_only:
        description: 'Publish ONLY ffmpeg-kit-https + ffmpeg-kit-https-gpl (real distinct AARs, downloaded from the same release_tag) -- skips the primary artifact and the redirects'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Detect version and LTS branch
        id: meta
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          NUM=$(echo "$TAG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          MAJOR=$(echo "$NUM" | cut -d. -f1)
          if [ "$MAJOR" = "8" ]; then
            LTS="android-8.1-lts"
            ARTIFACT="ffmpeg-81"
            AAR_NAME="ffmpeg-kit-free81-${NUM}-arm64-v8a.aar"
          elif [ "$MAJOR" = "7" ]; then
            LTS="android-7.1-lts"
            ARTIFACT="ffmpeg-71"
            AAR_NAME="ffmpeg-kit-free71-${NUM}-arm64-v8a.aar"
          else
            LTS="android-6.0-lts"
            ARTIFACT="ffmpeg"
            AAR_NAME="ffmpeg-kit-free-${NUM}-arm64-v8a.aar"
          fi
          echo "lts=$LTS"           >> $GITHUB_OUTPUT
          echo "artifact=$ARTIFACT" >> $GITHUB_OUTPUT
          echo "aar_name=$AAR_NAME" >> $GITHUB_OUTPUT
          echo "version=$NUM"       >> $GITHUB_OUTPUT

      - name: Download AAR from GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LTS="${{ steps.meta.outputs.lts }}"
          AAR_NAME="${{ steps.meta.outputs.aar_name }}"
          DEST="${LTS}/android/ffmpeg-kit-android-lib/build/outputs/aar/ffmpeg-kit-release.aar"
          mkdir -p "$(dirname "$DEST")"
          gh release download "${{ github.event.inputs.release_tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$AAR_NAME" \
            --output "$DEST"
          echo "Downloaded: $(du -sh "$DEST")"

      - name: Download https/https-gpl AARs from GitHub Release (https_aliases_only mode)
        if: github.event.inputs.https_aliases_only == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LTS="${{ steps.meta.outputs.lts }}"
          VERSION="${{ steps.meta.outputs.version }}"
          DEST_DIR="${LTS}/android/ffmpeg-kit-android-lib/prebuilt-aars"
          mkdir -p "$DEST_DIR"
          gh release download "${{ github.event.inputs.release_tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "ffmpeg-kit-https-${VERSION}-arm64-v8a-x86_64.aar" \
            --output "${DEST_DIR}/ffmpeg-kit-https.aar"
          gh release download "${{ github.event.inputs.release_tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "ffmpeg-kit-https-gpl-${VERSION}-arm64-v8a-x86_64.aar" \
            --output "${DEST_DIR}/ffmpeg-kit-https-gpl.aar"
          ls -la "$DEST_DIR"

      - name: Publish to Maven Central (primary + redirects)
        working-directory: ${{ steps.meta.outputs.lts }}/android
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: "B30609B4"
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          ARTIFACT="${{ steps.meta.outputs.artifact }}"
          GROUP="dev.ffmpegkit-maintained"
          chmod +x gradlew

          if [ "${{ github.event.inputs.https_aliases_only }}" = "true" ]; then
            echo "Https-aliases-only mode: publishing ffmpeg-kit-https + ffmpeg-kit-https-gpl (real AARs), skipping primary/redirects."
            ./gradlew :ffmpeg-kit-android-lib:publishMavenHttpsPublicationToMavenCentralRepository \
              :ffmpeg-kit-android-lib:publishMavenHttpsGplPublicationToMavenCentralRepository \
              --no-configuration-cache --no-daemon \
              -x :ffmpeg-kit-android-lib:bundleReleaseAar \
              -Ppublish.version="${VERSION}"
          elif [ "${{ github.event.inputs.redirects_only }}" = "true" ]; then
            echo "Redirects-only mode: publishing search-alias publications, skipping the primary artifact."
            ./gradlew :ffmpeg-kit-android-lib:publishMavenRedirectKitPublicationToMavenCentralRepository \
              :ffmpeg-kit-android-lib:publishMavenRedirectDashPublicationToMavenCentralRepository \
              --no-configuration-cache --no-daemon \
              -x :ffmpeg-kit-android-lib:bundleReleaseAar \
              -Ppublish.version="${VERSION}"
          else
            POM_URL="https://repo1.maven.org/maven2/${GROUP//.//}/${ARTIFACT}/${VERSION}/${ARTIFACT}-${VERSION}.pom"
            if curl -sf "$POM_URL" > /dev/null 2>&1; then
              echo "Version ${VERSION} of ${ARTIFACT} already on Maven Central — skipping."
            else
              ./gradlew :ffmpeg-kit-android-lib:publishAndReleaseToMavenCentral \
                --no-configuration-cache --no-daemon \
                -x :ffmpeg-kit-android-lib:bundleReleaseAar \
                -Ppublish.version="${VERSION}"
            fi
          fi
