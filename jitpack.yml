jdk:
  - openjdk17
before_install:
  - chmod +x gradlew
install:
  - |
    set -e
    # JITPACK_VERSION is empty in some JitPack environments; fall back to version file
    RAW="${JITPACK_VERSION:-$(cat JITPACK_VERSION_FILE 2>/dev/null)}"
    NUM=$(echo "$RAW" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
    MAJOR=$(echo "$NUM" | cut -d. -f1)
    RELEASE_TAG="v${NUM}-lts-android"

    if [ "$MAJOR" = "8" ]; then
      AAR="ffmpeg-kit-free81-${NUM}-arm64-v8a.aar"
    elif [ "$MAJOR" = "7" ]; then
      AAR="ffmpeg-kit-free71-${NUM}-arm64-v8a.aar"
    else
      AAR="ffmpeg-kit-free-${NUM}-arm64-v8a.aar"
    fi

    echo "version: $NUM | release: $RELEASE_TAG | AAR: $AAR"
    curl -fL -o ffmpeg-kit-android.aar \
      "https://github.com/ffmpegkit-maintained/ffmpeg/releases/download/${RELEASE_TAG}/${AAR}"
    echo "Downloaded: $(du -sh ffmpeg-kit-android.aar)"

    ./gradlew publishToMavenLocal -Pjitpack.version="${NUM}"
