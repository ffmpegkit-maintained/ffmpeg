jdk:
  - openjdk17
before_install:
  - chmod +x gradlew
install:
  - |
    set -e
    # JITPACK_VERSION is empty in some JitPack environments. Fall back to the tag JitPack
    # actually checked out (self-contained, no file to keep in sync -- a prior attempt at a
    # static JITPACK_VERSION_FILE fallback was never actually created/maintained and silently
    # broke every build that hit the empty-env-var case).
    RAW="${JITPACK_VERSION:-$(git describe --tags --exact-match 2>/dev/null)}"
    NUM=$(echo "$RAW" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
    if [ -z "$NUM" ]; then
      echo "::error::could not determine version: JITPACK_VERSION empty and git describe found no exact tag match"
      exit 1
    fi
    MAJOR=$(echo "$NUM" | cut -d. -f1)
    RELEASE_TAG="v${NUM}-lts-android"

    if [ "$MAJOR" = "8" ]; then
      AAR="ffmpeg-kit-free81-${NUM}-arm64-v8a.aar"
    elif [ "$MAJOR" = "7" ]; then
      AAR="ffmpeg-kit-free71-${NUM}-arm64-v8a.aar"
    else
      AAR="ffmpeg-kit-free-${NUM}-arm64-v8a.aar"
    fi

    echo "version: $NUM | release: $RELEASE_TAG | AAR: $AAR"
    curl -fL -o ffmpeg-kit-android.aar \
      "https://github.com/ffmpegkit-maintained/ffmpeg/releases/download/${RELEASE_TAG}/${AAR}"
    echo "Downloaded: $(du -sh ffmpeg-kit-android.aar)"

    ./gradlew publishToMavenLocal -Pjitpack.version="${NUM}"
